name: Latest Blog Posts

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull latest blog posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://yangcazz.github.io/feed.xml"
          max_post_count: 5
          readme_path: "./README.md"
          commit_message: "Update recent blog posts"
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          comment_tag_name: "BLOG-POST-LIST"
          template: "$newline- [$title]($url)"
          date_format: "mmm dd, yyyy"
