name: Generate Stats

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch stats
        run: |
          set -e
          mkdir -p stats

          STATS_BASE=(
            "https://github-readme-stats.vercel.app"
            "https://github-readme-stats-eight-theta.vercel.app"
            "https://github-readme-stats-git-master.anuraghazra.vercel.app"
          )
          GRAPH_BASE=(
            "https://github-readme-activity-graph.vercel.app"
          )

          fetch_svg() {
            local output="$1"; shift
            for base in "$@"; do
              local url="${base}${path}"
              echo "Trying: $url"
              curl -sS --retry 2 --retry-delay 3 "$url" -o "$output"
              if head -1 "$output" 2>/dev/null | grep -q '<svg'; then
                echo "OK"
                return 0
              fi
              echo "  -> Failed (not valid SVG), trying next mirror..."
            done
            echo "::error::All mirrors exhausted for $output"
            return 1
          }

          path="/api?username=YangCazz&show_icons=true&hide_border=true&bg_color=0d1117&title_color=58a6ff&icon_color=79c0ff&text_color=c9d1d9"
          fetch_svg stats/stats.svg "${STATS_BASE[@]}"

          path="/api/top-langs?username=YangCazz&layout=compact&hide_border=true&bg_color=0d1117&title_color=58a6ff&text_color=c9d1d9"
          fetch_svg stats/top-langs.svg "${STATS_BASE[@]}"

          path="/graph?username=YangCazz&theme=github-compact&hide_border=true&bg_color=0d1117&color=58a6ff&line=79c0ff"
          fetch_svg stats/activity-graph.svg "${GRAPH_BASE[@]}"

      - name: Commit stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats/
          git diff --staged --quiet || git commit -m "Update stats images"
          git pull --rebase
          git push
